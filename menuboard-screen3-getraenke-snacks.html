<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Space Magic - Screen 3: Getränke & Snacks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: #1a0a2e;
  }

  body {
    background:
      radial-gradient(ellipse 800px 700px at 80% 30%, rgba(0,229,200,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 800px 600px at 20% 70%, rgba(255,210,53,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 600px 500px at 50% 50%, rgba(139,92,246,0.08) 0%, transparent 60%),
      linear-gradient(180deg, #1a0a2e 0%, #0d0620 100%);
  }

  .screen {
    position: relative;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BANNER */
  .top-banner {
    height: 80px;
    background: linear-gradient(90deg, #00e5c8 0%, #8b5cf6 50%, #ffd235 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  .banner-text {
    font-size: 40px;
    font-weight: 800;
    color: #1a0a2e;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  .banner-emoji { font-size: 40px; }

  /* MAIN LAYOUT - 3 Spalten */
  .content {
    flex: 1;
    display: flex;
    gap: 14px;
    padding: 16px 20px;
    overflow: hidden;
  }

  .col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-height: 0;
  }

  /* FEATURED PRODUCT HIGHLIGHT */
  .featured {
    background: rgba(255,255,255,0.06);
    border-radius: 16px;
    border: 1px solid rgba(255,210,53,0.2);
    padding: 12px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .featured::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #ffd235, #ff7b3a);
  }

  .featured-icon {
    font-size: 42px;
    width: 62px;
    height: 62px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .featured-info { flex: 1; }

  .featured-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ffd235, #ff7b3a);
    color: #1a0a2e;
    font-size: 12px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .featured-name {
    font-size: 24px;
    font-weight: 800;
    color: #fff;
  }

  .featured-price {
    font-size: 34px;
    font-weight: 900;
    color: #ffd235;
    text-shadow: 0 2px 12px rgba(255,210,53,0.3);
    flex-shrink: 0;
  }

  /* SUPER FEATURED (Slush Eis) */
  .featured.super {
    border-color: rgba(0,229,200,0.3);
    background: linear-gradient(135deg, rgba(0,229,200,0.1) 0%, rgba(139,92,246,0.08) 100%);
    padding: 14px 20px;
  }

  .featured.super::before {
    height: 4px;
    background: linear-gradient(90deg, #00e5c8, #8b5cf6, #ff3d8e);
  }

  .featured.super .featured-icon {
    font-size: 52px;
    width: 76px;
    height: 76px;
  }

  .featured.super .featured-badge {
    background: linear-gradient(135deg, #00e5c8, #8b5cf6);
    color: #fff;
    font-size: 13px;
    padding: 3px 12px;
  }

  .featured.super .featured-name {
    font-size: 28px;
  }

  .featured.super .featured-price {
    font-size: 40px;
  }

  /* LIST PANEL */
  .list-panel {
    background: rgba(255,255,255,0.05);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .list-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    position: relative;
    flex-shrink: 0;
  }

  .list-head::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 3px;
    background: var(--cat-color, rgba(255,255,255,0.1));
    opacity: 0.5;
    border-radius: 2px;
  }

  .list-head-icon {
    font-size: 24px;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .list-head-title {
    font-size: 23px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .list-body {
    flex: 1;
    padding: 4px 10px 6px;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
    min-height: 0;
  }

  /* LIST ITEM */
  .li {
    display: flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 6px;
    gap: 6px;
    flex-shrink: 0;
  }

  .li:nth-child(odd) {
    background: rgba(255,255,255,0.06);
  }

  .li-icon {
    display: none;
  }

  .li-name {
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 1;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .li-dots {
    flex: 1;
    border-bottom: 2px dotted rgba(255,255,255,0.12);
    min-width: 12px;
    margin: 0 6px;
    align-self: flex-end;
    margin-bottom: 5px;
  }

  .li-desc {
    font-size: 15px;
    color: rgba(255,255,255,0.35);
    flex-shrink: 0;
    margin-right: 6px;
  }

  .li-label {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    margin-right: 6px;
  }

  .li-label.bio {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
    border: 1px solid rgba(34,197,94,0.25);
  }

  .li-price {
    font-size: 24px;
    font-weight: 800;
    color: #ffd235;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
    min-width: 62px;
    text-align: right;
  }

  .li.hl {
    background: linear-gradient(90deg, rgba(255,210,53,0.06) 0%, transparent 100%);
    border-left: 2px solid #ffd235;
  }

  /* BOTTOM BAR */
  .bottombar {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(13,6,32,0.8);
  }

  .bottom-text {
    font-size: 15px;
    color: rgba(255,255,255,0.35);
  }

  .bottom-text strong {
    color: #00e5c8;
    font-weight: 600;
  }

  .bottom-tags { display: flex; gap: 10px; }

  .btag {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .btag.pink {
    background: rgba(255,61,142,0.1);
    color: #ff3d8e;
    border: 1px solid rgba(255,61,142,0.15);
  }

  .btag.teal {
    background: rgba(0,229,200,0.1);
    color: #00e5c8;
    border: 1px solid rgba(0,229,200,0.15);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    color: rgba(255,255,255,0.3);
    font-size: 20px;
    letter-spacing: 2px;
  }

  /* ANIMATIONEN */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 2px 12px currentColor; }
    50% { text-shadow: 0 2px 24px currentColor, 0 0 40px currentColor; }
  }

  @keyframes floatIcon {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .col {
    opacity: 0;
    animation: slideUp 0.6s ease forwards;
  }
  .col:nth-child(1) { animation-delay: 0.1s; }
  .col:nth-child(2) { animation-delay: 0.3s; }
  .col:nth-child(3) { animation-delay: 0.5s; }

  .featured-badge {
    background-size: 200% 100%;
    animation: shimmer 4s ease-in-out infinite;
  }
  .featured.super .featured-badge {
    background: linear-gradient(90deg, #00e5c8 0%, #8b5cf6 40%, #00e5c8 80%);
    background-size: 200% 100%;
    color: #fff;
    animation: shimmer 4s ease-in-out infinite;
  }
  .featured:not(.super) .featured-badge {
    background: linear-gradient(90deg, #ffd235 0%, #ff7b3a 40%, #ffd235 80%);
    background-size: 200% 100%;
    animation: shimmer 4s ease-in-out infinite;
  }

  .featured .featured-price {
    animation: glowPulse 3s ease-in-out infinite;
  }

  .featured .featured-icon {
    animation: floatIcon 3s ease-in-out infinite;
  }

  .featured .featured-icon {
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.15));
  }

  .featured.super .featured-icon {
    filter: drop-shadow(0 0 6px rgba(0,229,200,0.4)) drop-shadow(0 0 12px rgba(139,92,246,0.2));
  }

  .li.hl .li-price {
    animation: glowPulse 3s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="screen">

  <div class="top-banner">
    <span class="banner-emoji">🥤</span>
    <span class="banner-text">Getränke & Snacks</span>
    <span class="banner-emoji">🍬</span>
  </div>

  <div class="content" id="content">
    <div class="loading">Karte wird geladen...</div>
  </div>

  <div class="bottombar">
    <div class="bottom-text"><strong>Space Magic</strong> · Fischteichweg 15-17 · 26603 Aurich</div>
    <div class="bottom-tags">
      <span class="btag teal">spacemagic.fun</span>
      <span class="btag pink">Allergene auf Anfrage</span>
    </div>
  </div>

</div>

<script src="menuboard-data.js"></script>
<script>
  const ACCENT = {
    'teal': '#00e5c8', 'pink': '#ff3d8e',
    'yellow': '#ffd235', 'purple': '#8b5cf6', 'orange': '#ff7b3a',
  };

  // Produkte die als Featured-Karte hervorgehoben werden
  const FEATURED_PRODUCTS = {
    'Slush Eis':     { badge: 'Top Seller', superSize: true },
    'Kaffee Crema':  { badge: 'Beliebt' },
    'Coca Cola':     { badge: 'Klassiker' },
  };

  // Lokale Labels (als farbige Badges dargestellt)
  const LOCAL_BADGES = {
    'Grüner Tee':    { text: 'Bio', style: 'bio' },
    'Ostfriesentee': { text: 'Bio', style: 'bio' },
    'Kamillentee':   { text: 'Bio', style: 'bio' },
  };

  // Volumenangaben pro Produkt
  const VOLUME_LABELS = {
    'Coca Cola Zero':  '0,5l',  'Fanta Orange':    '0,5l',
    'Sprite':          '0,5l',  'Mezzo Mix':       '0,5l',
    'Lift Apfelschorle':'0,5l', 'Fuze Tea Pfirsich':'0,5l',
    'Fuze Tea Zitronengras':'0,5l', 'Powerrade M.Blast':'0,5l',
    'Monster Energy':  '0,5l',  'Monster Ultra White':'0,5l',
    'Auricher Orangensaft':'0,2l', 'Auricher Apfelsaft':'0,2l',
    'Vio Schorle Zitrone-Limette':'0,5l', 'Vio Bio Lemon':'0,5l',
    'Vio Bio Limette-Orange':'0,5l', 'Vio Wasser medium':'0,5l',
    'Vio Wasser still':'0,5l',
  };

  function renderListItem(item) {
    const isHL = item['Highlight'] === 'ja';
    const badge = LOCAL_BADGES[item['Produkt']];
    const volume = VOLUME_LABELS[item['Produkt']];
    const desc = item['Beschreibung'] ? `<span class="li-desc">${item['Beschreibung']}</span>` : '';
    const badgeHTML = badge ? `<span class="li-label ${badge.style}">${badge.text}</span>` : '';
    const volHTML = volume ? `<span class="li-desc">${volume}</span>` : '';
    return `
      <div class="li${isHL ? ' hl' : ''}">
        <span class="li-name">${item['Produkt']}</span>
        ${badgeHTML}${desc}${volHTML}
        <span class="li-dots"></span>
        <span class="li-price">${formatPrice(item['Preis'])}</span>
      </div>
    `;
  }

  // Custom SVG Icons fuer Featured-Produkte
  const FEATURED_SVGS = {
    'Slush Eis': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">
      <line x1="14.5" y1="1" x2="12.5" y2="8.5" stroke="#ff3d8e" stroke-width="1.8"/>
      <path d="M6.5 9.5 Q6.5 5.5 12 5.5 Q17.5 5.5 17.5 9.5" stroke="url(#slushDome)" stroke-width="1.8" fill="rgba(0,229,200,0.15)"/>
      <rect x="6" y="9.5" width="12" height="1.5" rx="0.5" stroke="url(#slushDome)" stroke-width="1.2" fill="rgba(139,92,246,0.25)"/>
      <path d="M6.5 11 L8.5 22 h7 L17.5 11" stroke="url(#slushCup)" stroke-width="1.8" fill="rgba(0,229,200,0.08)"/>
      <path d="M9 14.5 Q10.5 13.5 12 14.5 Q13.5 15.5 15 14.5" stroke="#8b5cf6" stroke-width="1.2" fill="none" opacity="0.7"/>
      <path d="M9.5 17.5 Q11 16.5 12.5 17.5 Q14 18.5 14.5 17.5" stroke="#ff3d8e" stroke-width="1.2" fill="none" opacity="0.5"/>
      <defs>
        <linearGradient id="slushDome" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00e5c8"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
        <linearGradient id="slushCup" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00e5c8"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
      </defs>
    </svg>`,

    'Kaffee Crema': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">
      <path d="M7 5 Q7.5 3 9 3.5" stroke="#ff7b3a" stroke-width="1.2" opacity="0.5"/>
      <path d="M10 4 Q10.5 1.5 12 2.5" stroke="#ff7b3a" stroke-width="1.2" opacity="0.6"/>
      <path d="M13.5 5 Q14 3 15.5 3.8" stroke="#ff7b3a" stroke-width="1.2" opacity="0.4"/>
      <ellipse cx="11" cy="8" rx="6" ry="2" stroke="url(#coffeeRim)" stroke-width="1.5" fill="rgba(255,123,58,0.2)"/>
      <path d="M5 8 L6.5 21 h9 L17 8" stroke="url(#coffeeCup)" stroke-width="1.8" fill="rgba(139,92,246,0.08)"/>
      <path d="M17 11 Q20 11 20 14 Q20 17 17 17" stroke="#8b5cf6" stroke-width="1.5" fill="none"/>
      <ellipse cx="11" cy="10" rx="4.8" ry="1.2" fill="rgba(255,123,58,0.3)" stroke="none"/>
      <ellipse cx="10" cy="10.2" rx="1.5" ry="0.5" fill="rgba(255,255,255,0.12)" stroke="none"/>
      <defs>
        <linearGradient id="coffeeRim" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff7b3a"/><stop offset="100%" stop-color="#ffd235"/></linearGradient>
        <linearGradient id="coffeeCup" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff7b3a"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
      </defs>
    </svg>`,

    'Coca Cola': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">
      <ellipse cx="12" cy="2.5" rx="2.5" ry="1" stroke="#ff3d8e" stroke-width="1.5" fill="rgba(255,61,142,0.15)"/>
      <path d="M9.5 3.5 Q9.5 5 10 6 Q10.5 7 10 8 Q9 10 8.5 12 Q7.5 16 8 20 Q8.2 22 10 22 h4 Q15.8 22 16 20 Q16.5 16 15.5 12 Q15 10 14 8 Q13.5 7 14 6 Q14.5 5 14.5 3.5" stroke="url(#colaBottle)" stroke-width="1.8" fill="rgba(255,61,142,0.06)"/>
      <path d="M10 6 h4" stroke="#ff3d8e" stroke-width="1.2" opacity="0.5"/>
      <rect x="9" y="12" width="6" height="5" rx="1" stroke="#ff3d8e" stroke-width="1" fill="rgba(255,61,142,0.12)"/>
      <path d="M10 14.5 Q12 13.5 14 14.5" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.6"/>
      <circle cx="14.5" cy="18.5" r="0.8" fill="rgba(255,255,255,0.15)" stroke="none"/>
      <defs>
        <linearGradient id="colaBottle" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff3d8e"/><stop offset="40%" stop-color="#cc0033"/><stop offset="100%" stop-color="#ff3d8e"/></linearGradient>
      </defs>
    </svg>`,
  };

  // Marken-Logos neben dem Produktnamen
  const FEATURED_LOGOS = {
    'Coca Cola': 'https://upload.wikimedia.org/wikipedia/commons/c/ce/Coca-Cola_logo.svg',
  };

  function renderFeatured(item, config) {
    const isSuper = config.superSize;
    const bgColor = isSuper ? 'rgba(0,229,200,0.15)' : 'rgba(255,210,53,0.1)';
    const icon = PRODUCT_ICONS[item['Produkt']] || item['Icon'];
    const iconContent = FEATURED_SVGS[item['Produkt']] || icon;
    const logo = FEATURED_LOGOS[item['Produkt']];
    const logoHTML = logo ? `<img src="${logo}" alt="" style="height:22px;margin-left:8px;vertical-align:middle;filter:brightness(1.2)">` : '';
    return `
      <div class="featured${isSuper ? ' super' : ''}">
        <div class="featured-icon" style="background:${bgColor}">${iconContent}</div>
        <div class="featured-info">
          <div class="featured-badge">${config.badge}</div>
          <div class="featured-name">${item['Produkt']}${logoHTML}</div>
        </div>
        <div class="featured-price">${formatPrice(item['Preis'])}</div>
      </div>
    `;
  }

  function renderPanel(catName, items, flexVal) {
    if (!items || items.length === 0) return '';
    const color = items[0]['Farbe'] || 'teal';
    const accentColor = ACCENT[color] || '#ffd235';
    const icon = items[0]['Icon'] || '';
    const flexStyle = flexVal ? `flex:${flexVal};` : '';

    return `
      <div class="list-panel" style="${flexStyle}--cat-color:${accentColor}">
        <div class="list-head">
          <div class="list-head-icon" style="background:${accentColor}26">${icon}</div>
          <div class="list-head-title" style="color:${accentColor}">${catName}</div>
        </div>
        <div class="list-body">
          ${items.map(renderListItem).join('')}
        </div>
      </div>
    `;
  }

  async function render() {
    const data = await fetchMenuData();
    if (!data) return;

    const drinks = filterByPage(data, 'Getränke');
    const snacks = filterByPage(data, 'Snacks & Süßes');
    const dg = groupByCategory(drinks);
    const sg = groupByCategory(snacks);
    delete sg['Party Flatrates'];

    const container = document.getElementById('content');

    // Featured-Produkte aus ihren Listen extrahieren
    function extractFeatured(groups) {
      const featuredHTML = [];
      for (const [name, config] of Object.entries(FEATURED_PRODUCTS)) {
        for (const cat of Object.values(groups)) {
          const item = cat.find(i => i['Produkt'] === name);
          if (item) { featuredHTML.push(renderFeatured(item, config)); break; }
        }
      }
      return featuredHTML;
    }

    const drinksFeatured = extractFeatured(dg);

    // Softdrinks ohne Coca Cola (die ist als Featured)
    const softdrinksFiltered = (dg['Softdrinks'] || []).filter(i => !FEATURED_PRODUCTS[i['Produkt']]);
    // Energy ohne Slush Eis
    const energyAll = [...(dg['Energy'] || []), ...(dg['Specials'] || [])];
    const energyFiltered = energyAll.filter(i => !FEATURED_PRODUCTS[i['Produkt']]);
    // Warme Getraenke ohne Kaffee Crema
    const warmeFiltered = (dg['Warme Getränke'] || []).filter(i => !FEATURED_PRODUCTS[i['Produkt']]);

    // 3-Spalten Layout
    // Spalte 1: 3 Featured + Softdrinks + Energy
    let col1 = '<div class="col">';
    const featuredOrder = ['Slush Eis', 'Kaffee Crema', 'Coca Cola'];
    for (const name of featuredOrder) {
      const config = FEATURED_PRODUCTS[name];
      for (const cat of Object.values(dg)) {
        const item = cat.find(i => i['Produkt'] === name);
        if (item) { col1 += renderFeatured(item, config); break; }
      }
    }
    col1 += renderPanel('Softdrinks', softdrinksFiltered, 'none');
    if (energyFiltered.length) col1 += renderPanel('Energy', energyFiltered, 1);
    col1 += '</div>';

    // Spalte 2: Saefte & Wasser + Warme Getraenke + Alkohol
    let col2 = '<div class="col">';
    col2 += renderPanel('Warme Getränke', warmeFiltered, 1);
    col2 += renderPanel('Säfte & Wasser', dg['Säfte & Wasser'], 1);
    col2 += renderPanel('Alkohol', dg['Alkohol'], 0.4);
    col2 += '</div>';

    // Spalte 3: Snacks & Suesses - nur 2 Panels fuer weniger Overflow
    let col3 = '<div class="col">';

    // Panel 1: Gebaeck (Donuts + Muffins + Kuchen)
    const gebaeckItems = [
      ...(sg['Donuts'] || []).map(i => ({...i, Produkt: 'Donut ' + i['Produkt']})),
      ...(sg['Muffins'] || []).map(i => ({...i, Produkt: 'Muffin ' + i['Produkt']})),
      ...(sg['Kuchen'] || []),
    ];
    if (gebaeckItems.length) {
      const first = sg['Donuts']?.[0] || gebaeckItems[0];
      const items = gebaeckItems.map(i => ({...i, Icon: i['Icon'] || first['Icon'], Farbe: i['Farbe'] || first['Farbe']}));
      col3 += renderPanel('Gebäck & Kuchen', items, 'none');
    }

    // Panel 2: Alles Suesse + Chips (Schokoriegel + Suessigkeiten + Chips)
    const allSnacks = [
      ...(sg['Schokoriegel'] || []),
      ...(sg['Süßigkeiten'] || []),
      ...(sg['Chips & Snacks'] || []),
    ];
    if (allSnacks.length) col3 += renderPanel('Snacks & Süßes', allSnacks, 'none');

    col3 += '</div>';

    container.innerHTML = col1 + col2 + col3;
  }

  startAutoRefresh(render);
</script>

</body>
</html>
