<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Space Magic - Screen 1: Essen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: #1a0a2e;
  }

  body {
    background:
      radial-gradient(ellipse 900px 700px at 20% 30%, rgba(139,92,246,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 800px 600px at 80% 70%, rgba(255,61,142,0.2) 0%, transparent 70%),
      radial-gradient(ellipse 600px 500px at 50% 50%, rgba(0,229,200,0.08) 0%, transparent 70%),
      linear-gradient(180deg, #1a0a2e 0%, #0d0620 100%);
  }

  .screen {
    position: relative;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BANNER */
  .top-banner {
    height: 80px;
    background: linear-gradient(90deg, #ff3d8e 0%, #8b5cf6 40%, #00e5c8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 0 40px;
  }

  .banner-text {
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .banner-emoji { font-size: 40px; }

  /* MAIN GRID - 2x2 */
  .content {
    flex: 1;
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
    padding: 20px 24px;
  }

  /* CATEGORY CARD */
  .cat-card {
    background: rgba(255,255,255,0.05);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    backdrop-filter: blur(10px);
  }

  .cat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 24px 24px 0 0;
  }

  .cat-card[data-color="teal"]::before   { background: linear-gradient(90deg, #00e5c8, #8b5cf6); }
  .cat-card[data-color="pink"]::before   { background: linear-gradient(90deg, #ff3d8e, #ff7b3a); }
  .cat-card[data-color="yellow"]::before { background: linear-gradient(90deg, #ffd235, #ff7b3a); }
  .cat-card[data-color="purple"]::before { background: linear-gradient(90deg, #8b5cf6, #00e5c8); }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 28px 10px;
    flex-shrink: 0;
  }

  .cat-icon-wrap {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .cat-name {
    font-size: 30px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Produkt-Zeilen (Listenformat) */
  .products {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 4px 20px 16px;
    gap: 4px;
    justify-content: center;
  }

  .product-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-radius: 14px;
    gap: 16px;
    position: relative;
  }

  .product-row:nth-child(odd) {
    background: rgba(255,255,255,0.03);
  }

  .product-row.highlight {
    background: linear-gradient(90deg, rgba(255,210,53,0.08) 0%, transparent 100%);
    border-left: 3px solid #ffd235;
  }

  .product-row .p-icon {
    font-size: 36px;
    width: 52px;
    text-align: center;
    flex-shrink: 0;
  }

  .product-row .p-name {
    flex: 1;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
  }

  .product-row .p-desc {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    flex-shrink: 0;
    margin-right: 12px;
  }

  .product-row .p-price {
    font-size: 32px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    min-width: 100px;
    text-align: right;
  }

  .product-row .p-badge {
    position: absolute;
    top: 6px;
    right: 12px;
    background: linear-gradient(135deg, #ffd235, #ff7b3a);
    color: #1a0a2e;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* BOTTOM BAR */
  .bottombar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(13,6,32,0.8);
  }

  .bottom-text {
    font-size: 14px;
    color: rgba(255,255,255,0.35);
  }

  .bottom-text strong {
    color: #00e5c8;
    font-weight: 600;
  }

  .bottom-tag {
    padding: 5px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    background: rgba(255,210,53,0.1);
    color: #ffd235;
    border: 1px solid rgba(255,210,53,0.15);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: rgba(255,255,255,0.3);
    font-size: 20px;
    letter-spacing: 2px;
    grid-column: 1 / -1;
    grid-row: 1 / -1;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .cat-card { animation: fadeIn 0.4s ease; }
</style>
</head>
<body>

<div class="screen">

  <div class="top-banner">
    <span class="banner-emoji">🍔</span>
    <span class="banner-text">Unsere Speisen</span>
    <span class="banner-emoji">🍕</span>
  </div>

  <div class="content" id="content">
    <div class="loading">Speisekarte wird geladen...</div>
  </div>

  <div class="bottombar">
    <div class="bottom-text"><strong>Space Magic</strong> · Fischteichweg 15-17 · 26603 Aurich · spacemagic.fun</div>
    <div class="bottom-tag">Alle Preise inkl. MwSt.</div>
  </div>
</div>

<script src="menuboard-data.js"></script>
<script>
  const ACCENT_COLORS = {
    'teal': '#00e5c8', 'pink': '#ff3d8e',
    'yellow': '#ffd235', 'purple': '#8b5cf6', 'orange': '#ff7b3a',
  };

  const CAT_COLORS = {
    'Burger': 'teal', 'Pizza': 'pink',
    'Würstchen': 'yellow', 'Fingerfood': 'purple',
  };

  function renderProduct(item, accentColor) {
    const isHighlight = item['Highlight'] === 'ja';
    const icon = PRODUCT_ICONS[item['Produkt']] || item['Icon'] || '';
    const desc = item['Beschreibung'] ? `<span class="p-desc">${item['Beschreibung']}</span>` : '';
    return `
      <div class="product-row${isHighlight ? ' highlight' : ''}">
        <span class="p-icon">${icon}</span>
        <span class="p-name">${item['Produkt']}</span>
        ${desc}
        <span class="p-price" style="color:${accentColor}">${formatPrice(item['Preis'])}</span>
        ${isHighlight ? '<span class="p-badge">Beliebt</span>' : ''}
      </div>
    `;
  }

  function renderCategory(catName, items, color) {
    const accentColor = ACCENT_COLORS[color] || '#ffd235';
    const icon = items[0]?.['Icon'] || '';
    return `
      <div class="cat-card" data-color="${color}">
        <div class="cat-header">
          <div class="cat-icon-wrap" style="background:${accentColor}33">${icon}</div>
          <div class="cat-name" style="color:${accentColor}">${catName}</div>
        </div>
        <div class="products">
          ${items.map(item => renderProduct(item, accentColor)).join('')}
        </div>
      </div>
    `;
  }

  async function render() {
    const data = await fetchMenuData();
    if (!data) return;

    const essenItems = filterByPage(data, 'Essen');
    const grouped = groupByCategory(essenItems);
    const container = document.getElementById('content');
    const cats = ['Burger', 'Pizza', 'Würstchen', 'Fingerfood'];

    let html = '';
    for (const cat of cats) {
      if (grouped[cat]) {
        html += renderCategory(cat, grouped[cat], CAT_COLORS[cat] || 'teal');
      }
    }
    container.innerHTML = html;
  }

  startAutoRefresh(render);
</script>

</body>
</html>
