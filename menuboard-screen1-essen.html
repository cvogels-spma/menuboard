<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Space Magic - Screen 1: Essen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: #1a0a2e;
  }

  body {
    background:
      radial-gradient(ellipse 900px 700px at 20% 30%, rgba(139,92,246,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 800px 600px at 80% 70%, rgba(255,61,142,0.2) 0%, transparent 70%),
      radial-gradient(ellipse 600px 500px at 50% 50%, rgba(0,229,200,0.08) 0%, transparent 70%),
      linear-gradient(180deg, #1a0a2e 0%, #0d0620 100%);
  }

  .screen {
    position: relative;
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BANNER */
  .top-banner {
    height: 80px;
    background: linear-gradient(90deg, #ff3d8e 0%, #8b5cf6 40%, #00e5c8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 0 40px;
    position: relative;
  }

  .banner-left {
    position: absolute;
    left: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .banner-logo {
    height: 44px;
    filter: brightness(0) invert(1) drop-shadow(0 1px 3px rgba(0,0,0,0.3));
  }

  .banner-datetime {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    line-height: 1.2;
  }

  .banner-time {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .banner-date {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  .banner-text {
    font-size: 32px;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .banner-emoji { font-size: 40px; }

  /* MAIN GRID - 2x2 */
  .content {
    flex: 1;
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    grid-template-rows: 1fr 1fr;
    gap: 16px;
    padding: 20px 24px;
  }

  /* CATEGORY CARD */
  .cat-card {
    background: rgba(255,255,255,0.05);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    backdrop-filter: blur(10px);
  }

  .cat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 24px 24px 0 0;
  }

  .cat-card[data-color="teal"]::before   { background: linear-gradient(90deg, #00e5c8, #8b5cf6); }
  .cat-card[data-color="pink"]::before   { background: linear-gradient(90deg, #ff3d8e, #ff7b3a); }
  .cat-card[data-color="yellow"]::before { background: linear-gradient(90deg, #ffd235, #ff7b3a); }
  .cat-card[data-color="purple"]::before { background: linear-gradient(90deg, #8b5cf6, #00e5c8); }

  .cat-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 28px 10px;
    flex-shrink: 0;
  }

  .cat-icon-wrap {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .cat-name {
    font-size: 30px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* Produkt-Zeilen (Listenformat) */
  .products {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 4px 20px 16px;
    gap: 4px;
    justify-content: center;
  }

  .product-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-radius: 14px;
    gap: 16px;
    position: relative;
  }

  .product-row:nth-child(odd) {
    background: rgba(255,255,255,0.03);
  }

  .product-row.highlight {
    background: linear-gradient(90deg, rgba(255,210,53,0.08) 0%, transparent 100%);
    border-left: 3px solid #ffd235;
  }

  .product-row .p-icon {
    font-size: 36px;
    width: 52px;
    text-align: center;
    flex-shrink: 0;
  }

  .product-row .p-name {
    flex: 1;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
  }

  .product-row .p-desc {
    font-size: 16px;
    color: rgba(255,255,255,0.4);
    flex-shrink: 0;
    margin-right: 12px;
  }

  .product-row .p-price {
    font-size: 32px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    min-width: 100px;
    text-align: right;
  }

  .product-row .p-badge {
    background: linear-gradient(135deg, #ffd235, #ff7b3a);
    color: #1a0a2e;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
    margin-right: 8px;
  }

  /* BOTTOM BAR */
  .bottombar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(13,6,32,0.8);
  }

  .bottom-text {
    font-size: 14px;
    color: rgba(255,255,255,0.35);
  }

  .bottom-text strong {
    color: #00e5c8;
    font-weight: 600;
  }

  .bottom-tag {
    padding: 5px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    background: rgba(255,210,53,0.1);
    color: #ffd235;
    border: 1px solid rgba(255,210,53,0.15);
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: rgba(255,255,255,0.3);
    font-size: 20px;
    letter-spacing: 2px;
    grid-column: 1 / -1;
    grid-row: 1 / -1;
  }

  /* ANIMATIONEN */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes softPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  @keyframes glowPulse {
    0%, 100% { text-shadow: 0 2px 12px currentColor; }
    50% { text-shadow: 0 2px 24px currentColor, 0 0 40px currentColor; }
  }

  .cat-card {
    opacity: 0;
    animation: slideUp 0.6s ease forwards;
  }
  .cat-card:nth-child(1) { animation-delay: 0.1s; }
  .cat-card:nth-child(2) { animation-delay: 0.25s; }
  .cat-card:nth-child(3) { animation-delay: 0.4s; }
  .cat-card:nth-child(4) { animation-delay: 0.55s; }

  .product-row .p-badge {
    background: linear-gradient(90deg, #ffd235 0%, #ff7b3a 40%, #ffd235 80%);
    background-size: 200% 100%;
    animation: shimmer 4s ease-in-out infinite;
  }

  .product-row.highlight .p-price {
    animation: glowPulse 3s ease-in-out infinite;
  }

  .cat-icon-wrap {
    animation: softPulse 4s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="screen">

  <div class="top-banner">
    <div class="banner-left">
      <img class="banner-logo" src="https://spacemagic.fun/fileadmin/logo.svg" alt="Space Magic">
      <div class="banner-datetime">
        <span class="banner-time" id="clock">--:--</span>
        <span class="banner-date" id="date">--</span>
      </div>
    </div>
    <span class="banner-emoji">🍔</span>
    <span class="banner-text">Unsere Speisen</span>
    <span class="banner-emoji">🍕</span>
  </div>

  <div class="content" id="content">
    <div class="loading">Speisekarte wird geladen...</div>
  </div>

  <div class="bottombar">
    <div class="bottom-text"><strong>Space Magic</strong> · Fischteichweg 15-17 · 26603 Aurich · spacemagic.fun</div>
    <div class="bottom-tag">Alle Preise inkl. MwSt.</div>
  </div>
</div>

<script src="menuboard-data.js"></script>
<script>
  const ACCENT_COLORS = {
    'teal': '#00e5c8', 'pink': '#ff3d8e',
    'yellow': '#ffd235', 'purple': '#8b5cf6', 'orange': '#ff7b3a',
  };

  const CAT_COLORS = {
    'Burger': 'teal', 'Pizza': 'pink',
    'Würstchen': 'yellow', 'Fingerfood': 'purple',
  };

  // Custom SVG Burger-Icons (stroke-based, neon style)
  const BURGER_SVGS = {
    'Hamburger': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">
      <path d="M4.5 11C4.5 7 7.5 4 12 4s7.5 3 7.5 7"/>
      <path d="M3.5 11h17"/>
      <path d="M4 13.5c1.2.8 2.5 1 4 .5s2.5-1 4-.5 2.5 1 4 .5 2.8-.3 4-.5"/>
      <rect x="4" y="15" width="16" height="2.5" rx="1.2"/>
      <path d="M4 19h16c0 0 0 1.5-1.5 2.5-.8.5-2 .5-2.5.5h-8c-.5 0-1.7 0-2.5-.5C4 20.5 4 19 4 19z"/>
    </svg>`,
    'Cheeseburger': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">
      <path d="M4.5 9.5C4.5 6 7.5 3 12 3s7.5 3 7.5 6.5"/>
      <path d="M3.5 9.5h17"/>
      <path d="M3.5 9.5l1 2.5 2-2 2 2 2-2 2 2 2-2 2 2 2-2 1 2"/>
      <rect x="4" y="14" width="16" height="2.5" rx="1.2"/>
      <path d="M4 18h16c0 0 0 1.5-1.5 2.5-.8.5-2 .5-2.5.5h-8c-.5 0-1.7 0-2.5-.5C4 19.5 4 18 4 18z"/>
    </svg>`,
    'Chicken Burger': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">
      <path d="M4.5 10C4.5 6.5 7.5 3.5 12 3.5S19.5 6.5 19.5 10"/>
      <circle cx="9" cy="6" r="0.6"/>
      <circle cx="12.5" cy="5" r="0.6"/>
      <circle cx="15.5" cy="6.5" r="0.6"/>
      <path d="M3.5 10h17"/>
      <path d="M5 13c.5-.8 1-1.5 1.8-1.5.7 0 1 .6 1.7.6s.9-.6 1.7-.6c.7 0 1 .6 1.7.6s.9-.6 1.7-.6c.7 0 1 .6 1.7.6s.9-.6 1.7-.6c.8 0 1.3.7 1.8 1.5"/>
      <path d="M5 13h14c0 1.5-.8 2.5-2 2.5H7C5.8 15.5 5 14.5 5 13z"/>
      <path d="M4 17.5h16"/>
      <path d="M4 17.5c0 0 0 1.5 1.5 2.5.8.5 2 .5 2.5.5h8c.5 0 1.7 0 2.5-.5 1.5-1 1.5-2.5 1.5-2.5"/>
    </svg>`,
    'Veggie Burger': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%">
      <path d="M4.5 10C4.5 6.5 7.5 3.5 12 3.5S19.5 6.5 19.5 10"/>
      <path d="M3.5 10h17"/>
      <path d="M3 12.5c1.5-2 4-2 5-.5"/>
      <path d="M4 11c.8 0 2.5.5 3 1.5"/>
      <path d="M5 14c1.5-1.5 3.5-2 5-1s3.5-.5 5 1 2.5 1.5 4 1"/>
      <rect x="5" y="15.5" width="14" height="2" rx="1"/>
      <circle cx="8" cy="16.5" r="0.5"/>
      <circle cx="11" cy="16.5" r="0.5"/>
      <circle cx="14" cy="16.5" r="0.5"/>
      <circle cx="16.5" cy="16.5" r="0.5"/>
      <path d="M4 19.5h16"/>
      <path d="M4 19.5c0 0 0 1.2 1.5 2 .8.4 2 .5 2.5.5h8c.5 0 1.7-.1 2.5-.5 1.5-.8 1.5-2 1.5-2"/>
    </svg>`,
  };

  // Individuelle Farben pro Burger-Variante
  const BURGER_COLORS = {
    'Hamburger':      '#00e5c8',  // teal
    'Cheeseburger':   '#ffd235',  // gelb (Käse)
    'Chicken Burger': '#ff7b3a',  // orange (Crispy)
    'Veggie Burger':  '#22c55e',  // grün (Veggie)
  };

  // Uhrzeit & Datum
  function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    document.getElementById('clock').textContent = time;
    document.getElementById('date').textContent = date;
  }
  updateClock();
  setInterval(updateClock, 30000);

  function renderProduct(item, accentColor) {
    const isHighlight = item['Highlight'] === 'ja';
    const icon = PRODUCT_ICONS[item['Produkt']] || item['Icon'] || '';
    const desc = item['Beschreibung'] ? `<span class="p-desc">${item['Beschreibung']}</span>` : '';
    const burgerColor = BURGER_COLORS[item['Produkt']];
    const iconHTML = BURGER_SVGS[item['Produkt']]
      ? `<span class="p-icon" style="color:${burgerColor}">${BURGER_SVGS[item['Produkt']]}</span>`
      : `<span class="p-icon">${icon}</span>`;
    return `
      <div class="product-row${isHighlight ? ' highlight' : ''}">
        ${iconHTML}
        <span class="p-name">${item['Produkt']}</span>
        ${desc}
        ${isHighlight ? '<span class="p-badge">Beliebt</span>' : ''}
        <span class="p-price" style="color:${accentColor}">${formatPrice(item['Preis'])}</span>
      </div>
    `;
  }

  function renderCategory(catName, items, color) {
    const accentColor = ACCENT_COLORS[color] || '#ffd235';
    const icon = items[0]?.['Icon'] || '';
    // Burger-Kategorie bekommt das Hamburger-SVG als Header-Icon
    const headerIcon = (catName === 'Burger' && BURGER_SVGS['Hamburger'])
      ? `<span style="color:${accentColor};width:28px;height:28px;display:inline-flex">${BURGER_SVGS['Hamburger']}</span>`
      : icon;
    return `
      <div class="cat-card" data-color="${color}">
        <div class="cat-header">
          <div class="cat-icon-wrap" style="background:${accentColor}33">${headerIcon}</div>
          <div class="cat-name" style="color:${accentColor}">${catName}</div>
        </div>
        <div class="products">
          ${items.map(item => renderProduct(item, accentColor)).join('')}
        </div>
      </div>
    `;
  }

  async function render() {
    const data = await fetchMenuData();
    if (!data) return;

    const essenItems = filterByPage(data, 'Essen');
    const grouped = groupByCategory(essenItems);
    const container = document.getElementById('content');
    const cats = ['Burger', 'Pizza', 'Würstchen', 'Fingerfood'];

    let html = '';
    for (const cat of cats) {
      if (grouped[cat]) {
        html += renderCategory(cat, grouped[cat], CAT_COLORS[cat] || 'teal');
      }
    }
    container.innerHTML = html;
  }

  startAutoRefresh(render);
</script>

</body>
</html>
